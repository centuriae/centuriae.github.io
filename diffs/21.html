    <script id="history-data" type="application/json">[{"hash": "f1f5b98", "date": "2026-05-12T20:23:59+01:00", "subject": "adds \"the feeling of grief\"", "content": "---\ntitle: The Feeling of Grief\nnumber: 21\nauthor: Arnol Fokam\nretreat: 2\n---\n\nHave you ever grieved the ones alive? \n\nHave you ever wished to be more than what you were, so you could be worthy of your past?\n\nYou ran away multiple times, and with each escape, you took a piece of her trust. \n\nOf course, her love is still in front of you, but you have failed way too many times. Perhaps, in another lifetime, but for now, *rest*...\n\nBut you want to be foolish one more time. Make them question your sanity. \n\nWhy can\u2019t you just leave for once?! Why can\u2019t you let her heal? Heal away from you, and then learn what a life looks like without your jokes echoing through her days. \n\nWhy is it so hard to enter the graveyard of her heart? Why are you so scared of being just a memory?\n\nAre you really in love with her, or are you just in love with the feeling of being loved? \n\nIt is not fair to her and the ones who have to pick the pieces every time you break her. \n\nYou want to go and leave her in peace, but the idea of being just a memory in her story is **frightening**.", "filename": "21-the-feeling-of-grief.md"}]</script>
